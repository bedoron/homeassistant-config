      target:
        entity_id: light.kitchen_counter_light_light
  mode: single

- id: '1744966800000'
  alias: VictoriaMetrics infrastructure reminder
  description: Send one Telegram reminder per day while VictoriaMetrics is unhealthy
  triggers:
    - trigger: time
      at: '09:00:00'
  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: sensor.victoriametrics_service_health
          state: online
  actions:
    - action: notify.doron
      data:
        message: >-
          🛠️ Infrastructure alert: VictoriaMetrics is
          {{ states('sensor.victoriametrics_service_health') }}.
          Check the Docker Health dashboard in Home Assistant.
  mode: single
