- id: '1714732568035'
  alias: Main Door Open
  description: Notify via Telegram when the front door opens
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.ewelink_ds01_iaszone
      from: 'off'
      to: 'on'
  condition: []
  action:
    - action: telegram_bot.send_message
      data:
        message: House door was opened
  mode: single

- id: '1714732622184'
  alias: Main Door Closed
  description: Notify via Telegram when the front door closes
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.ewelink_ds01_iaszone
      from: 'on'
      to: 'off'
  condition: []
  action:
    - action: telegram_bot.send_message
      data:
        message: House door was closed
  mode: single

- id: '1737739575689'
  alias: Kitchen counter lights switch action
