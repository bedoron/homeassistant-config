    - device_id: b3f41c2567dae54f17a13661b09804a7
      domain: zha
      platform: device
      type: remote_button_short_press
      subtype: remote_button_short_press
    - device_id: b4676c36697a1d92c6712e34654e59ca
      domain: zha
      platform: device
      type: remote_button_short_press
      subtype: remote_button_short_press
    - device_id: 91abc98ebfa42289831926f8bec418f6
      domain: zha
      platform: device
      type: remote_button_short_press
      subtype: button
  condition: []
  action:
    - action: switch.toggle
      target:
        entity_id: switch.tz3000_ps3dmato_ts011f_switch
  mode: single

